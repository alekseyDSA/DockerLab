services:
  nginx:
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      certbot:
        condition: service_healthy
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      placement:
        constraints:
          - node.role == worker
    healthcheck:
        test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80" ]
        interval: 30s
        timeout: 10s
        retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    image: ${REGISTRY:-localhost}/frontend:${TAG:-latest}
    networks:
      - web-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80" ]
    deploy:
      mode: replicated
      replicas: 2

  certbot:
    entrypoint: |
      /bin/sh -c "
        trap exit TERM
        echo 'Certbot запущен в режиме продакшена'
        while :; do
          certbot renew
          sleep 12h & wait $${!}
        done
      "
    healthcheck:
      test: ["CMD", "certbot", "certificates"]
      interval: 1h
      timeout: 30s
      retries: 3
      start_period: 30s
    restart: unless-stopped