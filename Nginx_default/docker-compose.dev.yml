services:
  nginx:
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    # В разработке не ждем ssl-gen, т.к. сертификаты создаются отдельно
    # depends_on убран - сертификаты либо есть, либо создаются через setup

  certbot:
    # В разработке certbot не нужен
    profiles:
      - never-used-in-dev
    entrypoint: |
      /bin/sh -c "
        echo '🔵 Certbot отключен в режиме разработки'
        sleep infinity
      "